<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Canaria Ultra Coach</title>

<style>
body{
font-family:Arial;
background:#08111f;
color:white;
padding:20px;
}

.card{
background:#101c35;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
background:#22c55e;
border:none;
padding:15px;
border-radius:10px;
font-size:18px;
width:100%;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}
</style>

</head>

<body>

<h1>Gran Canaria Ultra Coach V21</h1>

<div class="card">

<h3>Datos de la mañana</h3>

Peso
<input id="peso" value="94.2">

% grasa
<input id="grasa" value="22.4">

% músculo
<input id="musculo" value="50">

Cintura
<input id="cintura" value="100">

¿Gym hoy?
<select id="gym">
<option>No</option>
<option>Si</option>
</select>

<button onclick="calcular()">Generar protocolo</button>

</div>

<div class="card">

<h3>Resultados</h3>

<div id="prot"></div>
<div id="carb"></div>
<div id="fat"></div>
<div id="lean"></div>
<div id="goal"></div>

</div>

<script>

function calcular(){

let peso=parseFloat(document.getElementById("peso").value)
let grasa=parseFloat(document.getElementById("grasa").value)

let proteina=Math.round(peso*2.4)
let grasas=Math.round(peso*0.65)
let hidratos=55

let masaMagra=peso*(1-grasa/100)

let objetivo=masaMagra/0.88

document.getElementById("prot").innerHTML="Proteína objetivo: "+proteina+" g"

document.getElementById("carb").innerHTML="Hidratos objetivo: "+hidratos+" g"

document.getElementById("fat").innerHTML="Grasas objetivo: "+grasas+" g"

document.getElementById("lean").innerHTML="Masa magra: "+masaMagra.toFixed(1)+" kg"

document.getElementById("goal").innerHTML="Peso six-pack aprox: "+objetivo.toFixed(1)+" kg"

}

</script>

</body>
</html>
