<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Canaria Ultra Coach</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
font-weight:bold;
color:black;
}

.result{
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Gran Canaria Ultra Coach</h1>

<div class="card">

<h3>Datos de la mañana</h3>

Peso
<input id="peso" type="number">

% grasa
<input id="grasa" type="number">

% músculo
<input id="musculo" type="number">

Cintura
<input id="cintura" type="number">

Entreno hoy
<select id="entreno">
<option>No</option>
<option>Si</option>
</select>

<button onclick="generar()">Generar estrategia</button>

</div>

<div class="card result" id="resultado"></div>

<script>

function generar(){

let peso=parseFloat(document.getElementById("peso").value)
let grasa=parseFloat(document.getElementById("grasa").value)
let entreno=document.getElementById("entreno").value

let prote=peso*2.3
let grasaMacro=peso*0.6
let carbs=0
let estrategia=""

if(grasa>18){
estrategia="Definición agresiva"
carbs=80
}

if(grasa<18){
estrategia="Definición"
carbs=120
}

if(entreno=="Si"){
carbs+=40
}

document.getElementById("resultado").innerHTML=

"Fecha: "+new Date().toLocaleDateString()+"<br><br>"+

"Estrategia: "+estrategia+"<br><br>"+

"Proteína: "+prote.toFixed(0)+" g<br>"+

"Grasas: "+grasaMacro.toFixed(0)+" g<br>"+

"Hidratos: "+carbs+" g<br><br>"+

"Menú ejemplo:<br><br>"+

"Comida:<br>"+
"Pavo 150 g<br>"+
"Tortitas arroz 40 g<br>"+
"Frutos rojos 80 g<br><br>"+

"Cena:<br>"+
"Salmón 180 g<br>"+
"Patata 220 g<br>"+
"Verduras 200 g<br>"

}

</script>

</body>
</html>
