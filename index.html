<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Canaria Ultra Coach</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}

button{
background:#22c55e;
border:none;
padding:15px;
border-radius:12px;
font-weight:bold;
width:100%;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<h2>Gran Canaria Ultra Coach</h2>

<div class="card">

<h3>Datos de la mañana</h3>

<label>Peso</label>
<input id="peso" type="number">

<label>% grasa</label>
<input id="grasa" type="number">

<label>% músculo</label>
<input id="musculo" type="number">

<label>Cintura</label>
<input id="cintura" type="number">

</div>

<div class="card">

<button onclick="calcular()">Generar protocolo automático del día</button>

<div class="result" id="resultado"></div>

</div>

</div>

<script>

function calcular(){

let peso = parseFloat(document.getElementById("peso").value);

let proteina = (peso*2.3).toFixed(0);
let grasa = (peso*0.6).toFixed(0);
let calorias = (peso*28).toFixed(0);

let resultado = `
<h3>Protocolo del día</h3>

Proteína objetivo: ${proteina} g<br>
Grasas: ${grasa} g<br>
Calorías estimadas: ${calorias}

<br><br>

Estrategia recomendada: Definición
`;

document.getElementById("resultado").innerHTML = resultado;

}

</script>

</body>
</html>
