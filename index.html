<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Canaria Ultra Coach</title>

<style>

body{
font-family:Arial;
background:#08111f;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#101c35;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

.metric{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Gran Canaria Ultra Coach</h1>

<div class="card">

<h3>Datos de la mañana</h3>

<label>Peso (kg)</label>
<input id="peso">

<label>% grasa</label>
<input id="grasa">

<label>% músculo</label>
<input id="musculo">

<label>Cintura (cm)</label>
<input id="cintura">

<label>¿Hoy toca gimnasio?</label>
<select id="gym">
<option>No</option>
<option>Si</option>
</select>

<button onclick="calcular()">Generar protocolo</button>

</div>

<div class="card">

<h3>Macros objetivo</h3>

<div class="metric">Proteína: <span id="prot"></span> g</div>
<div class="metric">Hidratos: <span id="carb"></span> g</div>
<div class="metric">Grasas: <span id="fat"></span> g</div>

</div>

<div class="card">

<h3>Predicción corporal</h3>

<div class="metric">Masa magra: <span id="lean"></span> kg</div>
<div class="metric">Peso objetivo 12%: <span id="goal12"></span> kg</div>
<div class="metric">Peso objetivo 10% (six-pack): <span id="goal10"></span> kg</div>
<div class="metric">Semanas estimadas: <span id="weeks"></span></div>

</div>

</div>

<script>

function calcular(){

let peso=parseFloat(document.getElementById("peso").value)
let grasa=parseFloat(document.getElementById("grasa").value)
let gym=document.getElementById("gym").value

let proteina
let grasas
let hidratos

if(gym=="Si"){
proteina=peso*2.3
grasas=peso*0.6
hidratos=100
}else{
proteina=peso*2.4
grasas=peso*0.65
hidratos=55
}

document.getElementById("prot").innerText=Math.round(proteina)
document.getElementById("carb").innerText=Math.round(hidratos)
document.getElementById("fat").innerText=Math.round(grasas)

let masaMagra=peso*(1-grasa/100)

let objetivo12=masaMagra/0.88
let objetivo10=masaMagra/0.90

let semanas=(peso-objetivo10)/0.75

document.getElementById("lean").innerText=masaMagra.toFixed(1)
document.getElementById("goal12").innerText=objetivo12.toFixed(1)
document.getElementById("goal10").innerText=objetivo10.toFixed(1)
document.getElementById("weeks").innerText=semanas.toFixed(1)+" semanas"

}

</script>

</body>
</html>
